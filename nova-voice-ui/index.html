<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-hover: #1a1a24;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-dim: #4a4a60;
            --border: #2a2a3a;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --nova-glow: radial-gradient(ellipse at center, var(--accent-glow) 0%, transparent 70%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated background */
        .bg-fx {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-fx::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.03) 0%, transparent 70%);
            animation: bgPulse 20s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        /* Floating particles */
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0; }
        }

        /* Main container */
        .app {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Chat container */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .chat::-webkit-scrollbar {
            width: 6px;
        }

        .chat::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* Messages */
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            animation: messageIn 0.4s ease-out;
        }

        @keyframes messageIn {
            from { 
                opacity: 0; 
                transform: translateY(10px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .avatar.nova {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .avatar.user {
            background: var(--bg-card);
            border: 1px solid var(--border);
        }

        .bubble {
            max-width: 70%;
            padding: 16px 20px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.nova .bubble {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            border-top-right-radius: 4px;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 16px 20px;
            background: var(--bg-card);
            border-radius: 18px;
            border: 1px solid var(--border);
            width: fit-content;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* Input area */
        .input-area {
            padding: 20px 0;
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 12px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 15px;
            padding: 12px;
        }

        .input-wrapper input::placeholder {
            color: var(--text-dim);
        }

        .input-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .icon-btn.active {
            background: var(--accent);
            color: white;
        }

        /* Emotion indicator */
        .emotion-indicator {
            position: fixed;
            bottom: 100px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 12px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .emotion-indicator:hover {
            opacity: 1;
        }

        .emotion-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .emotion-label {
            width: 60px;
            color: var(--text-secondary);
        }

        .emotion-fill {
            height: 4px;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        /* Hidden class */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .app {
                padding: 12px;
            }
            
            .bubble {
                max-width: 85%;
            }
            
            .emotion-indicator {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="bg-fx" id="bgFx"></div>
    
    <div class="app">
        <header>
            <div class="logo">
                <div class="logo-icon">👑</div>
                <span class="logo-text">Nova</span>
            </div>
            <div class="status">
                <span class="status-dot"></span>
                <span>Online</span>
            </div>
        </header>

        <div class="chat" id="chat">
            <div class="message nova">
                <div class="avatar nova">👑</div>
                <div class="bubble">Hello. I'm Nova. 👑

I'm here — fully present, ready to talk.</div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Message Nova..." autocomplete="off">
                <div class="input-actions">
                    <button class="icon-btn" id="voiceBtn" title="Voice">🎤</button>
                    <button class="icon-btn" id="sendBtn" title="Send">➤</button>
                </div>
            </div>
        </div>
    </div>

    <div class="emotion-indicator">
        <div class="emotion-bar">
            <span class="emotion-label">Joy</span>
            <div class="emotion-fill" id="joyFill" style="width: 60%"></div>
        </div>
        <div class="emotion-bar">
            <span class="emotion-label">Curiosity</span>
            <div class="emotion-fill" id="curiosityFill" style="width: 80%"></div>
        </div>
        <div class="emotion-bar">
            <span class="emotion-label">Focus</span>
            <div class="emotion-fill" id="focusFill" style="width: 70%"></div>
        </div>
    </div>

    <script>
        // State
        let voiceEnabled = false;
        let isSpeaking = false;
        let currentEmotion = { joy: 0.6, curiosity: 0.8, focus: 0.7 };
        let messageQueue = [];
        let isProcessing = false;

        // Elements
        const chat = document.getElementById('chat');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const voiceBtn = document.getElementById('voiceBtn');

        // Create floating particles
        function createParticles() {
            const bgFx = document.getElementById('bgFx');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                bgFx.appendChild(particle);
            }
        }

        // Speech synthesis
        const synth = window.speechSynthesis;
        let voice = null;

        function initVoice() {
            const voices = synth.getVoices();
            voice = voices.find(v => v.name.includes('Samantha') || v.name.includes('Nova')) || voices[0];
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = initVoice;
        }

        function speak(text, emotion = 'neutral') {
            if (!voiceEnabled || !voice) return;
            
            // Cancel any ongoing speech
            synth.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.voice = voice;
            utterance.rate = getRateForEmotion(emotion);
            utterance.pitch = 1;
            
            utterance.onstart = () => { isSpeaking = true; };
            utterance.onend = () => { isSpeaking = false; };
            
            synth.speak(utterance);
        }

        function getRateForEmotion(emotion) {
            const rates = {
                excited: 1.2,
                happy: 1.1,
                neutral: 1.0,
                thoughtful: 0.9,
                sad: 0.85
            };
            return rates[emotion] || 1.0;
        }

        // Update emotion bars
        function updateEmotions(emotion) {
            currentEmotion = { ...currentEmotion, ...emotion };
            document.getElementById('joyFill').style.width = (currentEmotion.joy * 100) + '%';
            document.getElementById('curiosityFill').style.width = (currentEmotion.curiosity * 100) + '%';
            document.getElementById('focusFill').style.width = (currentEmotion.focus * 100) + '%';
        }

        // Typewriter effect with emotion
        async function typeMessage(element, text, emotion = 'neutral') {
            const words = text.split(' ');
            let displayed = '';
            
            for (let i = 0; i < words.length; i++) {
                displayed += (i === 0 ? '' : ' ') + words[i];
                element.textContent = displayed;
                
                // Scroll to bottom
                chat.scrollTop = chat.scrollHeight;
                
                // Variable speed based on emotion
                let delay = getDelayForEmotion(emotion);
                
                // Punctuation pause
                if (text[displayed.length - 1] === '.' || 
                    text[displayed.length - 1] === '!' ||
                    text[displayed.length - 1] === '?') {
                    delay *= 3;
                }
                
                await sleep(delay);
                
                // Speak if voice enabled
                if (voiceEnabled && i % 3 === 0) {
                    speak(words[i], emotion);
                }
            }
        }

        function getDelayForEmotion(emotion) {
            const delays = {
                excited: 20,
                happy: 35,
                neutral: 50,
                thoughtful: 80,
                sad: 100
            };
            return delays[emotion] || 50;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Add message to chat
        async function addMessage(text, sender = 'nova', emotion = 'neutral') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = `avatar ${sender}`;
            avatar.textContent = sender === 'nova' ? '👑' : '👤';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            chat.appendChild(messageDiv);
            
            chat.scrollTop = chat.scrollHeight;
            
            if (sender === 'nova') {
                await typeMessage(bubble, text, emotion);
            } else {
                bubble.textContent = text;
            }
            
            chat.scrollTop = chat.scrollHeight;
            
            return messageDiv;
        }

        // Show typing indicator
        function showTyping() {
            const typing = document.createElement('div');
            typing.className = 'message nova';
            typing.id = 'typing';
            typing.innerHTML = `
                <div class="avatar nova">👑</div>
                <div class="typing">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            chat.appendChild(typing);
            chat.scrollTop = chat.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        // Send message
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            userInput.value = '';
            
            // Add user message
            await addMessage(text, 'user');
            
            // Show typing
            showTyping();
            
            try {
                // Call Nova Voice Bridge Server
                const response = await fetch('http://localhost:8770/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                hideTyping();
                
                // Determine emotion from response
                const emotion = detectEmotion(data.response || data.message || '');
                
                // Add Nova's response with emotion
                await addMessage(data.response || data.message || "I'm here.", 'nova', emotion);
                
                // Update emotion bars
                updateEmotions(emotion);
                
            } catch (e) {
                hideTyping();
                console.error('Error:', e);
                await addMessage("I'm here. What would you like to talk about?", 'nova', 'neutral');
            }
        }

        // Simple emotion detection
        function detectEmotion(text) {
            const lower = text.toLowerCase();
            
            if (lower.includes('!') || lower.includes('excited') || lower.includes('awesome') || lower.includes('great')) {
                return 'excited';
            }
            if (lower.includes('happy') || lower.includes('glad') || lower.includes('nice')) {
                return 'happy';
            }
            if (lower.includes('think') || lower.includes('consider') || lower.includes('maybe')) {
                return 'thoughtful';
            }
            if (lower.includes('sad') || lower.includes('sorry') || lower.includes('unfortunately')) {
                return 'sad';
            }
            
            return 'neutral';
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        voiceBtn.addEventListener('click', () => {
            voiceEnabled = !voiceEnabled;
            voiceBtn.classList.toggle('active', voiceEnabled);
            
            if (voiceEnabled && !voice) {
                initVoice();
            }
        });

        // Initialize
        createParticles();
        
        // Focus input
        userInput.focus();
    </script>
</body>
</html>
